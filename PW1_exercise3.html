<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Exercise 1+2+3: Kitchen + Robot + Lighting & Shadows</title>
  <style>
    html, body { margin: 0; height: 100%; }
    #c { width: 100%; height: 100%; display: block; }
    .debug-info {
      position: absolute;
      top: 20px;
      left: 20px;
      background: rgba(0,0,0,0.7);
      color: #0f0;
      font-family: monospace;
      padding: 10px;
      border-radius: 5px;
      z-index: 100;
      pointer-events: none;
      font-size: 12px;
    }
  </style>
</head>
<body>
<div class="debug-info">
  <strong>Exercise 1: Kitchen Environment</strong><br>
  <strong>Exercise 2: Humanoid Robot (Hierarchical Modeling)</strong><br>
  <strong>Exercise 3: Lighting and Shadow</strong><br>
   Green = X | Red = Y | Blue = Z<br>
</div>
<canvas id="c"></canvas>

<script async src="https://unpkg.com/es-module-shims@1.3.6/dist/es-module-shims.js"></script>
<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import GUI from 'https://cdn.jsdelivr.net/npm/lil-gui@0.18/+esm';

function MinecraftWoman(scene, x = 0, y = 0, z = 0) {
    const group = new THREE.Group();
    
    // Materials
    const skinMaterial = new THREE.MeshStandardMaterial({ color: 0xE0AC69 });
    const dressMaterial = new THREE.MeshStandardMaterial({ color: 0xC44545 });
    const hairMaterial = new THREE.MeshStandardMaterial({ color: 0x8B4513 });
    const eyeMaterial = new THREE.MeshStandardMaterial({ color: 0x000000 });
    const legMaterial = new THREE.MeshStandardMaterial({ color: 0x5D3A1A });
    
    // legs (two single cubes) - these stay on ground 
    const leftLegGeo = new THREE.BoxGeometry(0.35, 0.5, 0.35);
    const leftLeg = new THREE.Mesh(leftLegGeo, legMaterial);
    leftLeg.position.set(-0.25, 0.25, 0);
    leftLeg.castShadow = true;
    leftLeg.receiveShadow = true;
    group.add(leftLeg);
    
    const rightLegGeo = new THREE.BoxGeometry(0.35, 0.5, 0.35);
    const rightLeg = new THREE.Mesh(rightLegGeo, legMaterial);
    rightLeg.position.set(0.25, 0.25, 0);
    rightLeg.castShadow = true;
    rightLeg.receiveShadow = true;
    group.add(rightLeg);
    
    // body with a dress to identify it's a female
    const bodyGeo = new THREE.BoxGeometry(0.8, 0.9, 0.4);
    const body = new THREE.Mesh(bodyGeo, dressMaterial);
    body.position.set(0, 0.95, 0);
    body.castShadow = true;
    body.receiveShadow = true;
    group.add(body);
    
    // head
    const headGeo = new THREE.BoxGeometry(0.8, 0.8, 0.4);
    const head = new THREE.Mesh(headGeo, skinMaterial);
    head.position.set(0, 1.8, 0);
    head.castShadow = true;
    head.receiveShadow = true;
    group.add(head);
    
    // hair
    const hairGeo = new THREE.BoxGeometry(0.82, 0.25, 0.42);
    const hair = new THREE.Mesh(hairGeo, hairMaterial);
    hair.position.set(0, 2.1, 0);
    hair.castShadow = true;
    group.add(hair);
    
    // side hair
    const hairSideGeo = new THREE.BoxGeometry(0.2, 0.35, 0.2);
    const hairLeft = new THREE.Mesh(hairSideGeo, hairMaterial);
    hairLeft.position.set(-0.5, 1.9, 0);
    hairLeft.castShadow = true;
    group.add(hairLeft);
    
    const hairRight = new THREE.Mesh(hairSideGeo, hairMaterial);
    hairRight.position.set(0.5, 1.9, 0);
    hairRight.castShadow = true;
    group.add(hairRight);
    
    // eyes
    const eyeGeo = new THREE.BoxGeometry(0.15, 0.15, 0.1);
    const leftEye = new THREE.Mesh(eyeGeo, eyeMaterial);
    leftEye.position.set(-0.25, 1.85, 0.21);
    group.add(leftEye);
    
    const rightEye = new THREE.Mesh(eyeGeo, eyeMaterial);
    rightEye.position.set(0.25, 1.85, 0.21);
    group.add(rightEye);
    
    // mouth
    const mouthGeo = new THREE.BoxGeometry(0.1, 0.1, 0.1);
    const mouth1 = new THREE.Mesh(mouthGeo, eyeMaterial);
    mouth1.position.set(-0.1, 1.65, 0.21);
    group.add(mouth1);
    
    const mouth2 = new THREE.Mesh(mouthGeo, eyeMaterial);
    mouth2.position.set(0, 1.65, 0.21);
    group.add(mouth2);
    
    const mouth3 = new THREE.Mesh(mouthGeo, eyeMaterial);
    mouth3.position.set(0.1, 1.65, 0.21);
    group.add(mouth3);
    
    // left arm: formed a group to build a movable arm, it has shoulder-upperarm-elbow-forearm-wrist-hand
    const leftArmGroup = new THREE.Group();
    leftArmGroup.position.set(-0.55, 1.4, 0);
    group.add(leftArmGroup);
    
    const leftShoulderAxes = new THREE.AxesHelper(0.8);
    leftArmGroup.add(leftShoulderAxes);
    
    const shoulderSphereGeo = new THREE.SphereGeometry(0.12, 16, 16);
    const shoulderSphere = new THREE.Mesh(shoulderSphereGeo, skinMaterial);
    shoulderSphere.position.set(0, 0, 0);
    leftArmGroup.add(shoulderSphere);
    
    const upperArmGroup = new THREE.Group();
    upperArmGroup.position.set(0, 0, 0);
    leftArmGroup.add(upperArmGroup);
    
    const upperArmGeo = new THREE.BoxGeometry(0.22, 0.5, 0.22);
    const upperArmMesh = new THREE.Mesh(upperArmGeo, skinMaterial);
    upperArmMesh.position.set(0, -0.25, 0);
    upperArmMesh.castShadow = true;
    upperArmGroup.add(upperArmMesh);
    
    const elbowGroup = new THREE.Group();
    elbowGroup.position.set(0, -0.5, 0);
    upperArmGroup.add(elbowGroup);
    
    const elbowAxes = new THREE.AxesHelper(0.6);
    elbowGroup.add(elbowAxes);
    
    const elbowSphereGeo = new THREE.SphereGeometry(0.1, 16, 16);
    const elbowSphere = new THREE.Mesh(elbowSphereGeo, skinMaterial);
    elbowSphere.position.set(0, 0, 0);
    elbowGroup.add(elbowSphere);
    
    const forearmGroup = new THREE.Group();
    forearmGroup.position.set(0, 0, 0);
    elbowGroup.add(forearmGroup);
    
    const forearmGeo = new THREE.BoxGeometry(0.18, 0.45, 0.18);
    const forearmMesh = new THREE.Mesh(forearmGeo, skinMaterial);
    forearmMesh.position.set(0, -0.225, 0);
    forearmMesh.castShadow = true;
    forearmGroup.add(forearmMesh);
    
    const wristGroup = new THREE.Group();
    wristGroup.position.set(0, -0.45, 0);
    forearmGroup.add(wristGroup);
    
    const handGeo = new THREE.BoxGeometry(0.2, 0.08, 0.22);
    const handMesh = new THREE.Mesh(handGeo, skinMaterial);
    handMesh.position.set(0, -0.04, 0);
    handMesh.castShadow = true;
    wristGroup.add(handMesh);
    
    // RIGHT ARM, the same as left
    const rightArmGroup = new THREE.Group();
    rightArmGroup.position.set(0.55, 1.4, 0);
    group.add(rightArmGroup);
    
    const rightShoulderAxes = new THREE.AxesHelper(0.8);
    rightArmGroup.add(rightShoulderAxes);
    
    const rightShoulderSphere = new THREE.Mesh(shoulderSphereGeo, skinMaterial);
    rightShoulderSphere.position.set(0, 0, 0);
    rightArmGroup.add(rightShoulderSphere);
    
    const rightUpperArmGroup = new THREE.Group();
    rightUpperArmGroup.position.set(0, 0, 0);
    rightArmGroup.add(rightUpperArmGroup);
    
    const rightUpperArmMesh = new THREE.Mesh(upperArmGeo, skinMaterial);
    rightUpperArmMesh.position.set(0, -0.25, 0);
    rightUpperArmMesh.castShadow = true;
    rightUpperArmGroup.add(rightUpperArmMesh);
    
    const rightElbowGroup = new THREE.Group();
    rightElbowGroup.position.set(0, -0.5, 0);
    rightUpperArmGroup.add(rightElbowGroup);
    
    const rightElbowAxes = new THREE.AxesHelper(0.6);
    rightElbowGroup.add(rightElbowAxes);
    
    const rightElbowSphere = new THREE.Mesh(elbowSphereGeo, skinMaterial);
    rightElbowSphere.position.set(0, 0, 0);
    rightElbowGroup.add(rightElbowSphere);
    
    const rightForearmGroup = new THREE.Group();
    rightForearmGroup.position.set(0, 0, 0);
    rightElbowGroup.add(rightForearmGroup);
    
    const rightForearmMesh = new THREE.Mesh(forearmGeo, skinMaterial);
    rightForearmMesh.position.set(0, -0.225, 0);
    rightForearmMesh.castShadow = true;
    rightForearmGroup.add(rightForearmMesh);
    
    const rightWristGroup = new THREE.Group();
    rightWristGroup.position.set(0, -0.45, 0);
    rightForearmGroup.add(rightWristGroup);
    
    const rightHandMesh = new THREE.Mesh(handGeo, skinMaterial);
    rightHandMesh.position.set(0, -0.04, 0);
    rightHandMesh.castShadow = true;
    rightWristGroup.add(rightHandMesh);
    
    // skirt details
    const skirtFrontGeo = new THREE.BoxGeometry(0.7, 0.15, 0.2);
    const skirtFront = new THREE.Mesh(skirtFrontGeo, dressMaterial);
    skirtFront.position.set(0, 0.5, 0.18);
    skirtFront.castShadow = true;
    group.add(skirtFront);
    
    const skirtBack = new THREE.Mesh(skirtFrontGeo, dressMaterial);
    skirtBack.position.set(0, 0.5, -0.18);
    skirtBack.castShadow = true;
    group.add(skirtBack);
    
    group.position.set(x, y, z);
    scene.add(group);
    
    return { group, leftArmGroup, elbowGroup, rightArmGroup, rightElbowGroup, skinMaterial, dressMaterial };
}

function main() {
    const canvas = document.querySelector('#c');

    const renderer = new THREE.WebGLRenderer({canvas, antialias: true});
    renderer.setSize(window.innerWidth, window.innerHeight);
    // Enable shadow maps
    renderer.shadowMap.enabled = true;  

    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 100);
    
    scene.background = new THREE.Color(0x333333);
    camera.position.set(5, 4, 6);
    camera.lookAt(0, 1.5, 0);
    
    const controls = new OrbitControls(camera, renderer.domElement);
    controls.target.set(0, 1.5, 0);
    controls.update();
    
    // ambient Light
    const ambientLight = new THREE.AmbientLight(0xffffff, 0.3);
    scene.add(ambientLight);

    // add a spotLight with shadows
    const spotLight = new THREE.SpotLight(0xffffff, 20);
    spotLight.position.set(0, 4, 2);
    spotLight.target.position.set(0, 1, 2);
    spotLight.castShadow = true;
    spotLight.shadow.mapSize.width = 1024;
    spotLight.shadow.mapSize.height = 1024;
    spotLight.shadow.bias = -0.0001;
    scene.add(spotLight);
    scene.add(spotLight.target);

    // lamp mesh
    const lampGeo = new THREE.CylinderGeometry(0.1, 0.1, 0.2, 16);
    const lampMat = new THREE.MeshStandardMaterial({ color: 0xffffaa, emissive: 0xffffaa, emissiveIntensity: 1 });
    const lampMesh = new THREE.Mesh(lampGeo, lampMat);
    lampMesh.position.set(0, 4, 2);
    lampMesh.castShadow = false;
    scene.add(lampMesh);
    
    const loader = new THREE.TextureLoader();
    const floorTexture = loader.load('https://threejs.org/examples/textures/minecraft/grass.png');
    floorTexture.wrapS = THREE.RepeatWrapping;
    floorTexture.wrapT = THREE.RepeatWrapping;
    floorTexture.repeat.set(15, 15);
    
    const floorGeo = new THREE.PlaneGeometry(10, 10);
    const floorMat = new THREE.MeshStandardMaterial({ map: floorTexture });
    const floor = new THREE.Mesh(floorGeo, floorMat);
    floor.rotation.x = -Math.PI / 2;
    floor.receiveShadow = true;
    scene.add(floor);
    
    const wallTexture = loader.load('https://threejs.org/examples/textures/minecraft/grass_dirt.png');
    wallTexture.wrapS = THREE.RepeatWrapping;
    wallTexture.wrapT = THREE.RepeatWrapping;
    wallTexture.repeat.set(15, 15);
    
    const backWallGeo = new THREE.BoxGeometry(10, 5, 0.2);
    const backWallMat = new THREE.MeshStandardMaterial({ map: wallTexture});
    const backWall = new THREE.Mesh(backWallGeo, backWallMat);
    backWall.position.set(0, 2.5, -5);
    backWall.castShadow = true;
    backWall.receiveShadow = true;
    scene.add(backWall);
    
    const leftWallGeo = new THREE.BoxGeometry(0.2, 5, 10);
    const leftWallMat = new THREE.MeshStandardMaterial({ map: wallTexture});
    const leftWall = new THREE.Mesh(leftWallGeo, leftWallMat);
    leftWall.position.set(-5, 2.5, 0);
    leftWall.castShadow = true;
    leftWall.receiveShadow = true;
    scene.add(leftWall);
    
    const CounterTexture = loader.load('https://threejs.org/examples/textures/hardwood2_diffuse.jpg');
    CounterTexture.wrapS = THREE.RepeatWrapping;
    CounterTexture.wrapT = THREE.RepeatWrapping;
    
    const counterGeo = new THREE.BoxGeometry(4, 1, 1);
    const counterMat = new THREE.MeshStandardMaterial({ map: CounterTexture });
    const counter = new THREE.Mesh(counterGeo, counterMat);
    counter.position.set(0, 0.5, 2);
    counter.castShadow = true;
    counter.receiveShadow = true;
    scene.add(counter);
    
    const cupGeo = new THREE.CylinderGeometry(0.2, 0.2, 0.3, 32);
    const cupMat = new THREE.MeshStandardMaterial({ color: 0xff5555, transparent: true, opacity: 0.5 });
    const cup = new THREE.Mesh(cupGeo, cupMat);
    cup.position.set(-1, 1 + 0.15, 2);
    cup.castShadow = true;
    scene.add(cup);
    
    const plateGeo = new THREE.CylinderGeometry(0.4, 0.4, 0.05, 32);
    const plateMat = new THREE.MeshStandardMaterial({ color: 0x5555ff });
    const plate = new THREE.Mesh(plateGeo, plateMat);
    plate.position.set(1, 1.025, 2);
    plate.castShadow = true;
    scene.add(plate);

    const woman = MinecraftWoman(scene, 0, 0, 0);

    // GUI Controls
    const gui = new GUI();

    const robotFolder = gui.addFolder('Robot Material');
    robotFolder.addColor({ color: woman.skinMaterial.color.getHex() }, 'color')
      .onChange((value) => woman.skinMaterial.color.set(value));
    robotFolder.addColor({ color: woman.dressMaterial.color.getHex() }, 'color')
      .onChange((value) => woman.dressMaterial.color.set(value));
    robotFolder.open();

    // Joint controls for Exercise 2
    const jointFolder = gui.addFolder('Robot Joints');
    jointFolder.add(woman.leftArmGroup.rotation, 'x', -1.8, 1.8, 0.01).name('Left Shoulder X');
    jointFolder.add(woman.elbowGroup.rotation, 'x', -1.8, 1.8, 0.01).name('Left Elbow X');
    jointFolder.add(woman.rightArmGroup.rotation, 'x', -1.8, 1.8, 0.01).name('Right Shoulder X');
    jointFolder.add(woman.rightElbowGroup.rotation, 'x', -1.8, 1.8, 0.01).name('Right Elbow X');
    jointFolder.open();

    // Ambient Light Controls for Exercise 3
    const ambientFolder = gui.addFolder('Ambient Light');
    ambientFolder.add(ambientLight, 'intensity', 0, 1, 0.01).name('Intensity');
    ambientFolder.addColor({ color: ambientLight.color.getHex() }, 'color')
      .name('Color')
      .onChange((value) => ambientLight.color.set(value));
    ambientFolder.open();

    // SpotLight Controls Exercise 3
    const spotFolder = gui.addFolder('Spot Light');
    spotFolder.add(spotLight, 'intensity', 0, 30, 0.5).name('Intensity');
    spotFolder.addColor({ color: spotLight.color.getHex() }, 'color')
      .name('Color')
      .onChange((value) => spotLight.color.set(value));
    spotFolder.open();   
    
    // Animation Loop
    function animate() {
        renderer.render(scene, camera);
        requestAnimationFrame(animate);
    }
    animate();
    
    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth/window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });
}

main();
</script>
</body>
</html>

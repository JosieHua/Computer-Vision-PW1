<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Exercise 1: Kitchen Environment Setup</title>
  <style>
    body, html { margin: 0; height: 100%; }
    #c { width: 100%; height: 100%; display: block; }
    .info {
      position: absolute;
      top: 20px;
      left: 20px;
      background: rgba(0,0,0,0.7);
      color: #0f0;
      font-family: monospace;
      padding: 10px;
      border-radius: 5px;
      z-index: 100;
      pointer-events: none;
      font-size: 12px;
    }
  </style>
</head>
<body>
<div class="info">
  <strong>Exercise 1: Kitchen Environment Setup</strong><br>
</div>
<canvas id="c"></canvas>

<script async src="https://unpkg.com/es-module-shims@1.3.6/dist/es-module-shims.js"></script>
<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

function main() {
    const canvas = document.querySelector('#c');

    // Scene Initialization 
    // Set up basic Three.js scene with perspective camera and WebGL renderer
    const renderer = new THREE.WebGLRenderer({canvas, antialias: true});
    renderer.setSize(window.innerWidth, window.innerHeight);
    // enable shadow 
    renderer.shadowMap.enabled = true;

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x333333);
    
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 100);
    camera.position.set(5, 4, 6);
    camera.lookAt(0, 1.5, 0);
    
    // OrbitControls for better viewing 
    const controls = new OrbitControls(camera, renderer.domElement);
    controls.target.set(0, 1.5, 0);
    controls.update();
    
    // lighting 
    const ambientLight = new THREE.AmbientLight(0xffffff, 0.7);
    scene.add(ambientLight);
    
    // Build a room 
    // Floor using PlaneGeometry and minecraft texture from the library
    const loader = new THREE.TextureLoader();
    const floorTexture = loader.load('https://threejs.org/examples/textures/minecraft/grass.png');
    floorTexture.wrapS = THREE.RepeatWrapping;
    floorTexture.wrapT = THREE.RepeatWrapping;
    floorTexture.repeat.set(15, 15);
    
    const floorGeo = new THREE.PlaneGeometry(10, 10);
    const floorMat = new THREE.MeshStandardMaterial({ map: floorTexture });
    const floor = new THREE.Mesh(floorGeo, floorMat);
    floor.rotation.x = -Math.PI / 2;
    floor.receiveShadow = true;
    scene.add(floor);
    
    // Back wall and also minecraft grass dirt texture from the library
    const wallTexture = loader.load('https://threejs.org/examples/textures/minecraft/grass_dirt.png');
    wallTexture.wrapS = THREE.RepeatWrapping;
    wallTexture.wrapT = THREE.RepeatWrapping;
    wallTexture.repeat.set(15, 15);
    
    const backWallGeo = new THREE.BoxGeometry(10, 5, 0.2);
    const backWallMat = new THREE.MeshStandardMaterial({ map: wallTexture });
    const backWall = new THREE.Mesh(backWallGeo, backWallMat);
    backWall.position.set(0, 2.5, -5);
    backWall.castShadow = true;
    backWall.receiveShadow = true;
    scene.add(backWall);
    
    // Left wall
    const leftWallGeo = new THREE.BoxGeometry(0.2, 5, 10);
    const leftWallMat = new THREE.MeshStandardMaterial({ map: wallTexture });
    const leftWall = new THREE.Mesh(leftWallGeo, leftWallMat);
    leftWall.position.set(-5, 2.5, 0);
    leftWall.castShadow = true;
    leftWall.receiveShadow = true;
    scene.add(leftWall);
    
    // Kitchen Counter) 
    // import a wooden material from the same library
    const CounterTexture = loader.load('https://threejs.org/examples/textures/hardwood2_diffuse.jpg');
    CounterTexture.wrapS = THREE.RepeatWrapping;
    CounterTexture.wrapT = THREE.RepeatWrapping;
    
    const counterGeo = new THREE.BoxGeometry(4, 1, 1);
    const counterMat = new THREE.MeshStandardMaterial({ map: CounterTexture });
    const counter = new THREE.Mesh(counterGeo, counterMat);
    counter.position.set(0, 0.5, 2);
    counter.castShadow = true;
    counter.receiveShadow = true;
    scene.add(counter);
    
    // cup and plates on counter
    // cup: using CylinderGeometry, transparent
    const cupGeo = new THREE.CylinderGeometry(0.2, 0.2, 0.3, 32);
    const cupMat = new THREE.MeshStandardMaterial({ color: 0xff5555, transparent: true, opacity: 0.5 });
    const cup = new THREE.Mesh(cupGeo, cupMat);
    cup.position.set(-1, 0.5 + 0.15, 2);  
    // adjust cup position
    cup.position.y = 1.0 + 0.15;
    cup.castShadow = true;
    scene.add(cup);
    
    // plate: using flattened CylinderGeometry
    const plateGeo = new THREE.CylinderGeometry(0.4, 0.4, 0.05, 32);
    const plateMat = new THREE.MeshStandardMaterial({ color: 0x5555ff });
    const plate = new THREE.Mesh(plateGeo, plateMat);
    plate.position.set(1, 1.0 + 0.025, 2);  // counter top at 1.0, plate half-height 0.025
    plate.castShadow = true;
    scene.add(plate);
    
    // animation loop
    function animate() {
        renderer.render(scene, camera);
        requestAnimationFrame(animate);
    }
    animate();
    
    // handle window resize
    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });
}

main();
</script>
</body>
</html>
